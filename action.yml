name: skill-guard
description: Scan agent skill and instruction files for security issues
branding:
  icon: shield
  color: red
inputs:
  path:
    description: File or directory to scan
    default: .
  fail-on:
    description: "Minimum severity that fails the check: note, low, medium, high, critical, never"
    default: high
  sarif-file:
    description: Path for the SARIF report
    default: skill-guard.sarif
  version:
    description: Version of the skill-guard tool to install
    default: 0.1.0
runs:
  using: composite
  steps:
    - name: Install skill-guard
      shell: bash
      run: |
        dotnet tool install -g skill-guard --version "${{ inputs.version }}"
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
    - name: Scan
      shell: bash
      run: |
        skill-guard scan "${{ inputs.path }}" \
          --fail-on "${{ inputs.fail-on }}" \
          --format sarif \
          --output "${{ inputs.sarif-file }}"
