name: ci
on:
  push:
    branches: [master]
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --configuration Release --no-restore
      - name: Pack
        run: dotnet pack src/SkillGuard.Cli/SkillGuard.Cli.csproj --configuration Release --no-build --output artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: nupkg
          path: artifacts/*.nupkg
